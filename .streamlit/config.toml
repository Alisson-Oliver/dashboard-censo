[theme]
base = "light"
primaryColor = "#0EA5E9"             # Cor principal (acoes e destaques)
backgroundColor = "#F8FAFC"          # Fundo do app (tema claro)
secondaryBackgroundColor = "#FFFFFF" # Sidebar e widgets
textColor = "#0F172A"
font = "sans serif"

[server]
headless = true               # Importante para rodar em servidores Linux (Ubuntu/Arch)
port = 8501                   # Porta padrão
enableCORS = true             # Permite CORS para compatibilidade com XSRF protection
maxUploadSize = 200           # Aumenta limite de upload de CSVs (em MB)

[browser]
gatherUsageStats = false      # Desativa telemetria (Privacidade)